# 一键启动：MySQL + 后端(FastAPI) + 前端(Nginx)
# 用法：  docker compose up -d --build
# 访问：  前端 http://localhost:5180   后端文档 http://localhost:8000/docs
services:
  mysql:
    image: mysql:8.4
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      MYSQL_DATABASE: fine_tuning
    ports:
      # 宿主用 3307，避免与本地常驻 MySQL84(3306) 冲突；容器内部仍是 3306
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root1234}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./server
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-root1234}@mysql:3306/fine_tuning?charset=utf8mb4
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      CORS_ORIGINS: http://localhost:5180
      AUTO_SEED: "true"
      STORAGE_DIR: /data/storage
    ports:
      - "8000:8000"
    volumes:
      - storage_data:/data/storage
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5180:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  storage_data:
